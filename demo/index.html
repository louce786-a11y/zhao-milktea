<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>传招冷饮 · 夏日冰爽特惠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #FFF8E7 0%, #F4C95D 30%, #A8E6CF 70%, #A0826D 100%);
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }

  /* ========== 手机画框（9:16 竖屏，360×640） ========== */
  .phone {
    position: relative;
    width: 360px;
    height: 640px;
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(160,130,109,0.4), 0 0 0 8px rgba(255,248,231,0.6);
    overflow: hidden;
    cursor: pointer;
    background: #FFF8E7;
  }

  /* Layer 1: 背景图（中 panel，含 logo + 主角 + 场景） */
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

  /* ========== CSS 渲染的 5 张卡（共用样式） ========== */
  .card {
    position: absolute;
    width: 64px;
    height: 92px;
    border-radius: 12px;
    background: rgba(255, 248, 231, 0.88);
    border: 2px solid rgba(168, 230, 207, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #6B4F3A;
    font-weight: 700;
    box-shadow: 0 6px 16px rgba(160,130,109,0.35), inset 0 1px 0 rgba(255,255,255,0.7);
    backdrop-filter: blur(10px) saturate(1.3);
    -webkit-backdrop-filter: blur(10px) saturate(1.3);
    transform-origin: center center;
    pointer-events: none;
    white-space: nowrap;
    transition:
      left 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00),
      top 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00),
      transform 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00);
  }
  .card-rare {
    background: linear-gradient(180deg, rgba(255, 248, 231, 0.95) 0%, rgba(244, 201, 93, 0.85) 100%);
    border-color: #F4C95D;
    box-shadow: 0 8px 24px rgba(244,201,93,0.55), 0 0 0 1.5px #F4C95D, inset 0 1px 0 rgba(255,255,255,0.7);
    animation: rareGlow 2.5s ease-in-out infinite;
  }
  @keyframes rareGlow {
    0%, 100% { box-shadow: 0 8px 24px rgba(244,201,93,0.55), 0 0 0 1.5px #F4C95D, inset 0 1px 0 rgba(255,255,255,0.7); }
    50%      { box-shadow: 0 10px 32px rgba(244,201,93,0.85), 0 0 0 2.5px #F4C95D, 0 0 20px rgba(244,201,93,0.4), inset 0 1px 0 rgba(255,255,255,0.7); }
  }
  .card-name { font-size: 10px; letter-spacing: 0.5px; color: #6B4F3A; opacity: 0.85; margin-bottom: 2px; font-weight: 700; }
  .card-discount {
    font-size: 18px; line-height: 1; font-weight: 900; margin: 2px 0;
    color: #6B4F3A; white-space: nowrap;
  }
  .card-prob { font-size: 12px; color: #6B4F3A; opacity: 0.75; font-weight: 700; margin-top: 3px; }

  /* 3 等级缩放（沿用 triptych 左 panel 视觉） */
  .card.tier-outer  { transform: translate(-50%, -50%) scale(0.86); z-index: 3; }
  .card.tier-inner  { transform: translate(-50%, -50%) scale(1.00); z-index: 4; }
  .card.tier-center { transform: translate(-50%, -50%) scale(1.18); z-index: 5; }

  /* 收拢状态：所有卡 → 水平等大（inner），top 47% */
  .card.collapsed {
    top: 47% !important;
    transform: translate(-50%, -50%) scale(1.00) !important;
    z-index: 4 !important;
  }
  .card.fade-out { opacity: 0; }

  /* Layer 3: "立即抽奖" 按钮（金黄色更协调） */
  .draw-btn {
    position: absolute;
    left: 50%;
    bottom: 6%;
    transform: translateX(-50%);
    z-index: 20;
    padding: 12px 36px;
    background: linear-gradient(180deg, #F4C95D 0%, #E0A82F 100%);
    color: #6B4F3A;
    border: 2.5px solid #FFF8E7;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(244,201,93,0.7), 0 2px 4px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
    cursor: pointer;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
    animation: btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 8px 24px rgba(244,201,93,0.7), 0 2px 4px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5); }
    50%      { box-shadow: 0 10px 32px rgba(244,201,93,0.9), 0 4px 8px rgba(0,0,0,0.2), 0 0 24px rgba(244,201,93,0.4), inset 0 1px 0 rgba(255,255,255,0.5); }
  }
  .draw-btn.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    pointer-events: none;
  }

  /* ========== 老虎机 viewport ========== */
  .reel-viewport {
    position: absolute;
    top: 36%; left: 0; right: 0;
    height: 23%;
    overflow: hidden;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .reel-viewport.active { opacity: 1; }
  .reel-viewport::after {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: #F4C95D;
    box-shadow: 0 0 8px #F4C95D;
    pointer-events: none;
    z-index: 10;
  }
  .reel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(0);
    display: flex;
    align-items: center;
    height: 100%;
    will-change: transform;
  }
  .reel .card {
    position: relative;
    left: auto; top: auto;
    flex-shrink: 0;
    margin: 0 4px;
  }
  .reel .card.tier-outer  { transform: scale(0.86); }
  .reel .card.tier-inner  { transform: scale(1.00); }
  .reel .card.tier-center { transform: scale(1.18); z-index: 5; }
  .reel .card.collapsed { transform: scale(1.00) !important; }

  /* ========== 提示 hint（默认隐藏，避免与按钮重复引导） ========== */
  .hint {
    position: absolute;
    top: 4%; left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    background: rgba(160,130,109,0.85);
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    display: none;  /* 默认隐藏 */
  }

  /* ========== 中奖弹窗 ========== */
  .result-popup {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .result-popup.show { display: flex; animation: fadeIn 0.4s; }
  .result-card {
    width: 240px;
    background: #FFF8E7;
    border: 3px solid #F4C95D;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(244,201,93,0.6);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .result-card .close {
    position: absolute; top: 8px; right: 12px;
    background: none; border: none;
    font-size: 22px; color: #6B4F3A;
    cursor: pointer; opacity: 0.5;
  }
  .result-title { font-size: 14px; color: #6B4F3A; opacity: 0.7; margin-bottom: 8px; }
  .result-name { font-size: 20px; font-weight: 800; color: #A0826D; margin-top: 12px; }
  .result-discount { font-size: 36px; font-weight: 800; color: #A0826D; margin: 6px 0; }
  .result-tip { font-size: 12px; color: #6B4F3A; opacity: 0.6; margin-top: 10px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <!-- Layer 1: 背景图（中 panel） -->
    <img class="bg" src="background-hires.png" alt="" />

    <!-- Layer 2: 5 张 CSS 渲染的卡（default 弧形） -->
    <div id="cardsArc"></div>

    <!-- Layer 3: "立即抽奖" 按钮 -->
    <button class="draw-btn" id="drawBtn">立即抽奖</button>

    <!-- Layer 4: 老虎机 viewport -->
    <div class="reel-viewport" id="reelViewport">
      <div class="reel" id="reel"></div>
    </div>

    <!-- 提示 hint（顶部） -->
    <div class="hint" id="hint">👆 点击屏幕抽奖</div>

    <!-- 中奖弹窗 -->
    <div class="result-popup" id="popup">
      <div class="result-card">
        <button class="close" id="closePopup">×</button>
        <div class="result-title">恭喜抽中</div>
        <div id="popupCardHolder"></div>
        <div class="result-name" id="popupName">奶茶券</div>
        <div class="result-discount" id="popupDiscount">9.8折</div>
        <div class="result-tip">到店出示即可享受</div>
      </div>
    </div>
  </div>

<script type="module">
import { COUPONS, ARC_ORDER, POSITION_TIER, ARC_POSITIONS, weightedPick, PityCounter, SlotLayout, ANIM, SLOT_WINNER_INDEX } from './game.js';

const phone = document.getElementById('phone');
const cardsArc = document.getElementById('cardsArc');
const drawBtn = document.getElementById('drawBtn');
const reelViewport = document.getElementById('reelViewport');
const reel = document.getElementById('reel');
const hint = document.getElementById('hint');
const popup = document.getElementById('popup');
const popupCardHolder = document.getElementById('popupCardHolder');
const popupName = document.getElementById('popupName');
const popupDiscount = document.getElementById('popupDiscount');
const closePopup = document.getElementById('closePopup');

const pity = new PityCounter();
let isSpinning = false;

// 折扣数字拆成 num + unit (例 "9.8折" → num=9.8, unit=折)
function splitDiscount(discount) {
  const m = discount.match(/^(\d+(?:\.\d+)?)(.*)$/);
  if (m) return { num: m[1], unit: m[2] };
  return { num: discount, unit: '' };
}

// ====== 创建 CSS 渲染的卡 DOM ======
function createCardEl(coupon) {
  const div = document.createElement('div');
  div.className = `card ${coupon.rare ? 'card-rare' : ''}`;
  const { num, unit } = splitDiscount(coupon.discount);
  div.innerHTML = `
    <div class="card-name">${coupon.name}</div>
    <div class="card-discount"><span class="num">${num}</span><span class="unit">${unit}</span></div>
    <div class="card-prob">${coupon.prob}%</div>
  `;
  div.dataset.id = coupon.id;
  return div;
}

// ====== 渲染 default 状态的 5 张卡（弧形布局） ======
function renderArcCards() {
  cardsArc.innerHTML = '';
  ARC_ORDER.forEach((id, idx) => {
    const coupon = COUPONS.find(c => c.id === id);
    const posKey = `P${idx + 1}`;
    const pos = ARC_POSITIONS[posKey];
    const el = createCardEl(coupon);
    el.classList.add(`tier-${pos.tier}`);
    el.style.left = `${pos.x}%`;
    el.style.top = `${pos.y}%`;
    cardsArc.appendChild(el);
  });
}
renderArcCards();

// ====== 渲染老虎机 reel ======
function renderReel(winnerId) {
  reel.innerHTML = '';
  const layout = SlotLayout.build(winnerId);
  layout.forEach((card, idx) => {
    const coupon = COUPONS.find(c => c.id === card.id);
    const tier = idx === SLOT_WINNER_INDEX ? 'center' : POSITION_TIER[card.position];
    const el = createCardEl(coupon);
    el.classList.add(`tier-${tier}`);
    reel.appendChild(el);
  });
}

// ====== 点击触发抽奖 ======
phone.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;
  hint.classList.add('hidden');
  drawBtn.classList.add('hidden');

  // 1. 加权随机选
  const expected = weightedPick();
  const result = pity.apply(expected);

  // 2. 5 张卡从弧形收拢到水平（等大 inner）
  document.querySelectorAll('#cardsArc .card').forEach(c => c.classList.add('collapsed'));

  // 3. 1500ms 收拢动画后 → 切到老虎机
  setTimeout(() => {
    document.querySelectorAll('#cardsArc .card').forEach(c => c.classList.add('fade-out'));
    reelViewport.classList.add('active');
    renderReel(result.id);

    // 4. 触发老虎机滚动
    const cardWidth = 112;  // 104 + 4*2 margin
    const offset = SlotLayout.finalOffset(cardWidth);
    reel.style.transition = `transform ${ANIM.SPIN_DURATION}ms ${ANIM.SPIN_EASING}`;
    void reel.offsetWidth;
    reel.style.transform = `translate(-50%, -50%) translateX(${offset}px)`;

    // 5. 老虎机停止后显示弹窗
    setTimeout(() => {
      showResult(result);
      isSpinning = false;
    }, ANIM.SPIN_DURATION + 200);
  }, ANIM.COLLAPSE_DURATION);
});

function showResult(coupon) {
  popupCardHolder.innerHTML = '';
  const el = createCardEl(coupon);
  // 弹窗里 card 不要 absolute
  el.style.position = 'relative';
  el.style.left = 'auto';
  el.style.top = 'auto';
  el.style.transform = 'none';
  el.style.margin = '8px auto';
  popupCardHolder.appendChild(el);
  popupName.textContent = coupon.name;
  popupDiscount.textContent = coupon.discount;
  popup.classList.add('show');
}

closePopup.addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('show');
  // 重置
  setTimeout(() => {
    document.querySelectorAll('#cardsArc .card').forEach(c => {
      c.classList.remove('collapsed', 'fade-out');
    });
    reelViewport.classList.remove('active');
    reel.style.transition = 'none';
    reel.style.transform = 'translate(-50%, -50%) translateX(0)';
    hint.classList.remove('hidden');
    drawBtn.classList.remove('hidden');
  }, 300);
});

// 3 秒后自动隐藏 hint
setTimeout(() => hint.classList.add('hidden'), 4000);
</script>
</body>
</html>
