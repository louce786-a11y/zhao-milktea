<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>传招冷饮 · 夏日冰爽特惠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #FFF8E7 0%, #F4C95D 30%, #A8E6CF 70%, #A0826D 100%);
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }

  /* ========== 手机画框（9:16 竖屏，486×864 canvas → 显示 360×640） ========== */
  .phone {
    position: relative;
    width: 360px;
    height: 640px;
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(160,130,109,0.4), 0 0 0 8px rgba(255,248,231,0.6);
    overflow: hidden;
    cursor: pointer;
  }

  /* Layer 1: 背景图（来自 triptych 中 panel，已含 logo + 主角 + 场景） */
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

  /* Layer 2: 5 张 sprite 卡（default 状态 = 弧形布局，复刻 triptych 左 panel） */
  .cards-arc {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .card-arc {
    position: absolute;
    width: 100px;
    height: 140px;
    object-fit: contain;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    transition:
      left 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00),
      top 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00),
      transform 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00);
  }
  /* 3 等级缩放（沿用 triptych 左 panel 视觉） */
  .card-arc.tier-outer  { transform: translate(-50%, -50%) scale(0.86); }
  .card-arc.tier-inner  { transform: translate(-50%, -50%) scale(1.00); }
  .card-arc.tier-center { transform: translate(-50%, -50%) scale(1.18); }
  /* 收拢状态：所有卡 → 水平等大（inner），top 47% */
  .card-arc.collapsed {
    top: 47% !important;
    transform: translate(-50%, -50%) scale(1.00) !important;
  }
  .card-arc.fade-out { opacity: 0; }

  /* Layer 3: "立即抽奖" 按钮（default 状态显示） */
  .draw-btn {
    position: absolute;
    left: 50%;
    bottom: 9%;
    transform: translateX(-50%);
    z-index: 6;
    padding: 14px 48px;
    background: linear-gradient(180deg, #A8E6CF 0%, #7FCFA8 100%);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 4px;
    box-shadow: 0 6px 20px rgba(168,230,207,0.6);
    cursor: pointer;
    pointer-events: none;     /* 让 phone 接收点击 */
    transition: opacity 0.3s, transform 0.3s;
  }
  .draw-btn.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    pointer-events: none;
  }

  /* Layer 4: 老虎机 viewport（覆盖在 5 张卡收拢后位置） */
  .reel-viewport {
    position: absolute;
    top: 36%; left: 0; right: 0;
    height: 23%;
    overflow: hidden;
    z-index: 7;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .reel-viewport.active { opacity: 1; }
  /* 老虎机中心线 */
  .reel-viewport::after {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: #F4C95D;
    box-shadow: 0 0 8px #F4C95D;
    pointer-events: none;
    z-index: 10;
  }
  .reel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(0);
    display: flex;
    align-items: center;
    height: 100%;
    will-change: transform;
  }
  .card-sprite {
    flex-shrink: 0;
    width: 100px;
    height: 140px;
    margin: 0 4px;
    object-fit: contain;
    transition: transform 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00);
  }
  .card-sprite.outer  { transform: scale(0.86);  z-index: 1; }
  .card-sprite.inner  { transform: scale(1.00);  z-index: 2; }
  .card-sprite.center { transform: scale(1.18);  z-index: 3; }
  .card-sprite.collapsed { transform: scale(1.00) !important; }

  /* ========== 提示 hint（首次显示 3 秒后消失） ========== */
  .hint {
    position: absolute;
    bottom: 12%; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(160,130,109,0.85);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    animation: hintPulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }
  .hint.hidden { display: none; }

  /* ========== 中奖弹窗 ========== */
  .result-popup {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .result-popup.show { display: flex; animation: fadeIn 0.4s; }
  .result-card {
    width: 240px;
    background: #FFF8E7;
    border: 3px solid #F4C95D;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(244,201,93,0.6);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .result-card .close {
    position: absolute; top: 8px; right: 12px;
    background: none; border: none;
    font-size: 22px; color: #6B4F3A;
    cursor: pointer; opacity: 0.5;
  }
  .result-title { font-size: 14px; color: #6B4F3A; opacity: 0.7; }
  .result-card-img { width: 100px; height: 140px; margin: 8px auto; object-fit: contain; }
  .result-name { font-size: 20px; font-weight: 800; color: #A0826D; }
  .result-discount { font-size: 36px; font-weight: 800; color: #A0826D; margin: 6px 0; }
  .result-tip { font-size: 12px; color: #6B4F3A; opacity: 0.6; margin-top: 10px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <!-- Layer 1: 背景图（中 panel，含 logo + 主角 + 场景） -->
    <img class="bg" src="background-hires.png" alt="" />

    <!-- Layer 2: 5 张 sprite 卡（default 弧形 / 收拢水平，由 JS 渲染） -->
    <div class="cards-arc" id="cardsArc"></div>

    <!-- Layer 3: "立即抽奖" 按钮（default 显示，spinning 隐藏） -->
    <button class="draw-btn" id="drawBtn">立即抽奖</button>

    <!-- Layer 4: 老虎机 viewport -->
    <div class="reel-viewport" id="reelViewport">
      <div class="reel" id="reel"></div>
    </div>

    <!-- 提示 hint -->
    <div class="hint" id="hint">👆 点击屏幕抽奖</div>

    <!-- 中奖弹窗 -->
    <div class="result-popup" id="popup">
      <div class="result-card">
        <button class="close" id="closePopup">×</button>
        <div class="result-title">恭喜抽中</div>
        <img class="result-card-img" id="popupCard" src="" alt="" />
        <div class="result-name" id="popupName">奶茶券</div>
        <div class="result-discount" id="popupDiscount">9.8折</div>
        <div class="result-tip">到店出示即可享受</div>
      </div>
    </div>
  </div>

<script type="module">
import { COUPONS, ARC_ORDER, POSITION_TIER, ARC_POSITIONS, weightedPick, PityCounter, SlotLayout, ANIM } from './game.js';

const phone = document.getElementById('phone');
const cardsArc = document.getElementById('cardsArc');
const drawBtn = document.getElementById('drawBtn');
const reelViewport = document.getElementById('reelViewport');
const reel = document.getElementById('reel');
const hint = document.getElementById('hint');
const popup = document.getElementById('popup');
const popupCard = document.getElementById('popupCard');
const popupName = document.getElementById('popupName');
const popupDiscount = document.getElementById('popupDiscount');
const closePopup = document.getElementById('closePopup');

const pity = new PityCounter();
let isSpinning = false;

// ====== 渲染 default 状态的 5 张卡（弧形布局，复刻 triptych 左 panel） ======
function renderArcCards() {
  cardsArc.innerHTML = '';
  ARC_ORDER.forEach((id, idx) => {
    const coupon = COUPONS.find(c => c.id === id);
    const posKey = `P${idx + 1}`;
    const pos = ARC_POSITIONS[posKey];
    const img = document.createElement('img');
    img.className = `card-arc tier-${pos.tier}`;
    img.style.left = `${pos.x}%`;
    img.style.top = `${pos.y}%`;
    img.src = `cards/card-${idx + 1}.png`;
    img.alt = `${coupon.name} ${coupon.discount}`;
    img.dataset.id = id;
    cardsArc.appendChild(img);
  });
}
renderArcCards();

// ====== 渲染老虎机 reel（40 张 sprite）======
function renderReel(winnerId) {
  reel.innerHTML = '';
  const layout = SlotLayout.build(winnerId);
  layout.forEach((card, idx) => {
    const tier = idx === SLOT_WINNER_INDEX ? 'center' : POSITION_TIER[card.position];
    const img = document.createElement('img');
    img.className = `card-sprite ${tier}`;
    img.src = `cards/${spriteFileFor(card.id)}`;
    img.alt = `${COUPONS.find(c => c.id === card.id).name}`;
    img.dataset.id = card.id;
    reel.appendChild(img);
  });
}

// sprite 文件映射：C1→card-1, C3→card-2, C5→card-3, C4→card-4, C2→card-5
function spriteFileFor(couponId) {
  const map = { C1: 1, C3: 2, C5: 3, C4: 4, C2: 5 };
  return `card-${map[couponId]}.png`;
}

const SLOT_WINNER_INDEX = 35;  // 与 game.js 保持一致

// ====== 点击触发抽奖 ======
phone.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;
  hint.classList.add('hidden');
  drawBtn.classList.add('hidden');

  // 1. 加权随机选
  const expected = weightedPick();
  const result = pity.apply(expected);

  // 2. 5 张卡从弧形收拢到水平（等大 inner）
  document.querySelectorAll('.card-arc').forEach(c => c.classList.add('collapsed'));

  // 3. 1500ms 收拢动画后 → 切到老虎机
  setTimeout(() => {
    // 弧形卡淡出
    document.querySelectorAll('.card-arc').forEach(c => c.classList.add('fade-out'));
    // 老虎机 viewport 淡入
    reelViewport.classList.add('active');
    renderReel(result.id);

    // 4. 触发老虎机滚动
    const cardWidth = 108;  // 100 + 4*2 margin
    const offset = SlotLayout.finalOffset(cardWidth);
    reel.style.transition = `transform ${ANIM.SPIN_DURATION}ms ${ANIM.SPIN_EASING}`;
    void reel.offsetWidth;
    reel.style.transform = `translate(-50%, -50%) translateX(${offset}px)`;

    // 5. 老虎机停止后显示弹窗
    setTimeout(() => {
      showResult(result);
      isSpinning = false;
    }, ANIM.SPIN_DURATION + 200);
  }, ANIM.COLLAPSE_DURATION);
});

function showResult(coupon) {
  popupCard.src = `cards/${spriteFileFor(coupon.id)}`;
  popupName.textContent = coupon.name;
  popupDiscount.textContent = coupon.discount;
  popup.classList.add('show');
}

closePopup.addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('show');
  // 重置
  setTimeout(() => {
    cardsArc.classList.remove('fade-out');
    document.querySelectorAll('.card-arc').forEach(c => c.classList.remove('collapsed'));
    reelViewport.classList.remove('active');
    reel.style.transition = 'none';
    reel.style.transform = 'translate(-50%, -50%) translateX(0)';
    hint.classList.remove('hidden');
    drawBtn.classList.remove('hidden');
  }, 300);
});

// 3 秒后自动隐藏 hint
setTimeout(() => hint.classList.add('hidden'), 4000);
</script>
</body>
</html>
