<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>传招冷饮 · 夏日冰爽特惠</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    background: linear-gradient(135deg, #FFF8E7 0%, #F4C95D 30%, #A8E6CF 70%, #A0826D 100%);
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }

  /* ========== 手机画框（9:16 竖屏，486×864 canvas） ========== */
  .phone {
    position: relative;
    width: 360px;
    height: 640px;
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(160,130,109,0.4), 0 0 0 8px rgba(255,248,231,0.6);
    overflow: hidden;
    cursor: pointer;
  }

  /* Layer 1: 背景图（middle panel，Logo + 角色 + 场景） */
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

  /* Layer 2: 默认状态 = preview.png（左 panel 完整截图，5 张卡 + 立即抽奖都在图里） */
  .preview {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 2;
    transition: opacity 0.3s;
  }
  .preview.hidden { opacity: 0; pointer-events: none; }

  /* Layer 3: 老虎机 viewport（覆盖在 preview 5 张卡位置） */
  .reel-viewport {
    position: absolute;
    top: 36%; left: 0; right: 0;
    height: 23%;
    overflow: hidden;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .reel-viewport.active { opacity: 1; }
  /* 老虎机中心线 */
  .reel-viewport::after {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: #F4C95D;
    box-shadow: 0 0 8px #F4C95D;
    pointer-events: none;
    z-index: 10;
  }
  .reel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateX(0);
    display: flex;
    align-items: center;
    height: 100%;
    will-change: transform;
  }

  /* Sprite 卡（3 等级等比缩放） */
  .card-sprite {
    flex-shrink: 0;
    width: 100px;
    height: 140px;
    margin: 0 4px;
    object-fit: contain;
    transition: transform 1.5s cubic-bezier(0.40, 0.80, 0.74, 1.00);
  }
  .card-sprite.outer  { transform: scale(0.86);  z-index: 1; }
  .card-sprite.inner  { transform: scale(1.00);  z-index: 2; }
  .card-sprite.center { transform: scale(1.18);  z-index: 3; }
  .card-sprite.collapsed { transform: scale(1.00) !important; }

  /* ========== 提示 hint（首次显示 3 秒后消失） ========== */
  .hint {
    position: absolute;
    bottom: 12%; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(160,130,109,0.85);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    animation: hintPulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }
  .hint.hidden { display: none; }

  /* ========== 中奖弹窗 ========== */
  .result-popup {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .result-popup.show { display: flex; animation: fadeIn 0.4s; }
  .result-card {
    width: 240px;
    background: #FFF8E7;
    border: 3px solid #F4C95D;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(244,201,93,0.6);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .result-card .close {
    position: absolute; top: 8px; right: 12px;
    background: none; border: none;
    font-size: 22px; color: #6B4F3A;
    cursor: pointer; opacity: 0.5;
  }
  .result-title { font-size: 14px; color: #6B4F3A; opacity: 0.7; }
  .result-card-img { width: 100px; height: 140px; margin: 8px auto; object-fit: contain; }
  .result-name { font-size: 20px; font-weight: 800; color: #A0826D; }
  .result-discount { font-size: 36px; font-weight: 800; color: #A0826D; margin: 6px 0; }
  .result-tip { font-size: 12px; color: #6B4F3A; opacity: 0.6; margin-top: 10px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <!-- Layer 1: 背景图（middle panel） -->
    <img class="bg" src="background-hires.png" alt="" />

    <!-- Layer 2: 默认状态 preview.png（左 panel 完整截图） -->
    <img class="preview" id="preview" src="preview.png" alt="传招冷饮" />

    <!-- Layer 3: 老虎机 viewport（覆盖 preview 5 张卡位置） -->
    <div class="reel-viewport" id="reelViewport">
      <div class="reel" id="reel"></div>
    </div>

    <!-- 提示 hint -->
    <div class="hint" id="hint">👆 点击屏幕抽奖</div>

    <!-- 中奖弹窗 -->
    <div class="result-popup" id="popup">
      <div class="result-card">
        <button class="close" id="closePopup">×</button>
        <div class="result-title">恭喜抽中</div>
        <img class="result-card-img" id="popupCard" src="" alt="" />
        <div class="result-name" id="popupName">奶茶券</div>
        <div class="result-discount" id="popupDiscount">9.8折</div>
        <div class="result-tip">到店出示即可享受</div>
      </div>
    </div>
  </div>

<script type="module">
import { COUPONS, ARC_ORDER, POSITION_TIER, weightedPick, PityCounter, SlotLayout, ANIM } from './game.js';

const phone = document.getElementById('phone');
const preview = document.getElementById('preview');
const reelViewport = document.getElementById('reelViewport');
const reel = document.getElementById('reel');
const hint = document.getElementById('hint');
const popup = document.getElementById('popup');
const popupCard = document.getElementById('popupCard');
const popupName = document.getElementById('popupName');
const popupDiscount = document.getElementById('popupDiscount');
const closePopup = document.getElementById('closePopup');

const pity = new PityCounter();
let isSpinning = false;

// 渲染单张 sprite 卡
function renderCard(card, isCenter) {
  const coupon = COUPONS.find(c => c.id === card.id);
  const tier = isCenter ? 'center' : POSITION_TIER[card.position];
  const img = document.createElement('img');
  img.className = `card-sprite ${tier}${isCenter ? ' was-center' : ''}`;
  img.src = `cards/${coupon.id === 'C1' ? 'card-1' : coupon.id === 'C3' ? 'card-2' : coupon.id === 'C5' ? 'card-3' : coupon.id === 'C4' ? 'card-4' : 'card-5'}.png`;
  img.alt = `${coupon.name} ${coupon.discount}`;
  img.dataset.id = coupon.id;
  return img;
}

// 老虎机 reel 渲染（40 张 sprite）
function renderReel(winnerId) {
  reel.innerHTML = '';
  const layout = SlotLayout.build(winnerId);
  layout.forEach((card, idx) => {
    reel.appendChild(renderCard(card, idx === 35));
  });
}

// === 收拢动画：初始 5 张可视卡 → 全部 inner ===
function showInitialCards() {
  reel.innerHTML = '';
  ARC_ORDER.forEach((id, idx) => {
    reel.appendChild(renderCard({ id, position: id, tier: POSITION_TIER[id] }, idx === 2));
  });
}

// === 点击触发抽奖 ===
phone.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;
  hint.classList.add('hidden');

  // 1. 加权随机选
  const expected = weightedPick();
  const result = pity.apply(expected);

  // 2. 隐藏 preview，显示老虎机
  preview.classList.add('hidden');
  reelViewport.classList.add('active');
  showInitialCards();

  // 3. 收拢动画（1500ms）→ 所有卡变 inner 大小
  setTimeout(() => {
    reel.querySelectorAll('.card-sprite').forEach(c => c.classList.add('collapsed'));

    // 4. 1500ms 后渲染 reel + 触发老虎机滚动
    setTimeout(() => {
      renderReel(result.id);
      const cardWidth = 108;  // 100 + 4*2 margin
      const offset = SlotLayout.finalOffset(cardWidth);
      reel.style.transition = `transform ${ANIM.SPIN_DURATION}ms ${ANIM.SPIN_EASING}`;
      void reel.offsetWidth;
      reel.style.transform = `translate(-50%, -50%) translateX(${offset}px)`;

      // 5. 老虎机停止后显示弹窗
      setTimeout(() => {
        showResult(result);
        isSpinning = false;
      }, ANIM.SPIN_DURATION + 200);
    }, ANIM.COLLAPSE_DURATION);
  }, 50);  // 50ms 等 preview 淡出
});

function showResult(coupon) {
  // 弹窗显示中奖卡 sprite
  const cardIdx = { C1: 1, C3: 2, C5: 3, C4: 4, C2: 5 }[coupon.id];
  popupCard.src = `cards/card-${cardIdx}.png`;
  popupName.textContent = coupon.name;
  popupDiscount.textContent = coupon.discount;
  popup.classList.add('show');
}

closePopup.addEventListener('click', (e) => {
  e.stopPropagation();
  popup.classList.remove('show');
  // 重置
  setTimeout(() => {
    preview.classList.remove('hidden');
    reelViewport.classList.remove('active');
    reel.style.transition = 'none';
    reel.style.transform = 'translate(-50%, -50%) translateX(0)';
    hint.classList.remove('hidden');
  }, 300);
});

// 3 秒后自动隐藏 hint
setTimeout(() => hint.classList.add('hidden'), 4000);
</script>
</body>
</html>
